<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a3b2c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Durak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toast-host" class="toast-host"></div>

  <div id="app">
    <!-- HOME -->
    <section id="screen-home" class="screen active">
      <div class="felt-bg"></div>
      <div class="card-panel">
        <div class="brand">
          <div class="brand-cards" aria-hidden="true">
            <span class="bc bc-1">A♠</span><span class="bc bc-2">K♥</span><span class="bc bc-3">Q♦</span>
          </div>
          <h1>DURAK</h1>
          <p class="subtitle">Transfer edition · play with your team anywhere</p>
        </div>

        <label class="field">
          <span>Your name</span>
          <input id="home-name" type="text" maxlength="20" placeholder="e.g. Alex" autocomplete="off" />
        </label>

        <div class="tabs">
          <button class="tab active" data-tab="join">Join room</button>
          <button class="tab" data-tab="create">Create room</button>
        </div>

        <div id="tab-join" class="tab-body active">
          <label class="field">
            <span>Room code</span>
            <input id="join-code" type="text" maxlength="4" placeholder="ABCD"
                   inputmode="latin" autocapitalize="characters" autocomplete="off" />
          </label>
          <button id="btn-join" class="primary">Join game</button>
        </div>

        <div id="tab-create" class="tab-body">
          <label class="field">
            <span>Players: <b id="lbl-players">4</b></span>
            <input id="opt-players" type="range" min="2" max="6" value="4" />
          </label>
          <label class="field">
            <span>Cards per player: <b id="lbl-hand">6</b></span>
            <input id="opt-hand" type="range" min="4" max="8" value="6" />
          </label>
          <label class="field">
            <span>Deck</span>
            <select id="opt-deck">
              <option value="36" selected>36 cards (6 – A)</option>
              <option value="52">52 cards (2 – A)</option>
              <option value="24">24 cards (9 – A)</option>
            </select>
          </label>
          <button id="btn-create" class="primary">Create room</button>
        </div>

        <p id="home-error" class="error"></p>
      </div>
      <div class="home-foot">
        <button id="sound-toggle-home" class="icon-btn" title="Sound">🔊</button>
        <span class="conn"><span id="conn-dot-home" class="conn-dot"></span> <span id="conn-text-home">connecting…</span></span>
      </div>
    </section>

    <!-- LOBBY -->
    <section id="screen-lobby" class="screen">
      <div class="felt-bg"></div>
      <div class="card-panel">
        <h2 class="lobby-title">Room</h2>
        <button id="lobby-code" class="code-pill big" title="Tap to copy">----</button>
        <p class="copy-hint">Tap the code to copy · share it with your team</p>
        <p class="subtitle center" id="lobby-rules"></p>
        <ul id="lobby-players" class="player-list"></ul>
        <button id="btn-start" class="primary" disabled>Start game</button>
        <p id="lobby-note" class="hint"></p>
        <button id="btn-leave-lobby" class="ghost">Leave room</button>
      </div>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen">
      <div class="felt-bg"></div>

      <header class="topbar">
        <button id="game-code" class="code-pill" title="Tap to copy">----</button>
        <div class="topbar-center">
          <span id="trump-badge" class="trump-badge"></span>
        </div>
        <div class="topbar-right">
          <button id="sound-toggle" class="icon-btn" title="Sound">🔊</button>
          <span class="conn small"><span id="conn-dot" class="conn-dot"></span></span>
        </div>
      </header>

      <div id="opponents" class="opponents"></div>

      <div id="table" class="table-area">
        <div class="piles">
          <div id="deck-pile" class="deck-pile" title="Cards left in deck">
            <div id="trump-under" class="trump-under"></div>
            <div class="deck-stack"></div>
            <span id="deck-count" class="pile-count">0</span>
          </div>
        </div>
        <div id="table-pairs" class="pairs"></div>
        <div class="piles right">
          <div id="discard-pile" class="discard-pile" title="Beaten cards">
            <span id="discard-count" class="pile-count">0</span>
          </div>
        </div>
        <div id="table-msg" class="table-msg"></div>
      </div>

      <div id="status" class="status"></div>
      <div id="actions" class="actions"></div>

      <div class="hand-wrap">
        <div id="hand" class="hand"></div>
      </div>

      <!-- end overlay -->
      <div id="overlay" class="overlay">
        <div class="overlay-card">
          <div id="overlay-emoji" class="overlay-emoji">🏆</div>
          <h2 id="overlay-title">Game over</h2>
          <p id="overlay-text"></p>
          <button id="btn-rematch" class="primary">Play again</button>
          <button id="btn-leave-game" class="ghost">Leave</button>
        </div>
      </div>
      <canvas id="confetti" class="confetti"></canvas>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
